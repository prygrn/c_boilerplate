name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

  asan:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run tests with AddressSanitizer + UBSan
        run: make asan

  test:
    name: Unit Tests (Unity)
    runs-on: ubuntu-latest
    needs: asan
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: make test

  valgrind:
    name: Valgrind (memcheck)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Run tests under Valgrind
        run: make valgrind
